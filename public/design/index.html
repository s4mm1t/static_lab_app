<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #ECE6D9; -webkit-font-smoothing: antialiased; }
  body { font-family: 'Manrope', sans-serif; }
  #root { height: 100%; min-height: 100vh; min-height: 100dvh; }

  /* iOS safe areas */
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
  }
  input, textarea, button { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #5A6373; }
  input:focus, textarea:focus { border-color: rgba(255,255,255,0.3) !important; }

  /* hide scrollbars inside the phone */
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }

  @keyframes screenIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: none; } }
  @keyframes dropIn   { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes blink    { 0%, 100% { opacity: 0.25; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-2px); } }
  @keyframes growBar  { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes scanline { 0% { top: 16px; } 50% { top: calc(100% - 20px); } 100% { top: 16px; } }
  @keyframes indet    { 0% { transform: translateX(-100%); } 100% { transform: translateX(320%); } }
  @keyframes softRise  { from { opacity: 0; transform: translateY(18px) scale(.98); } to { opacity: 1; transform: none; } }
  @keyframes softPop   { 0% { transform: scale(.94); } 55% { transform: scale(1.04); } 100% { transform: scale(1); } }
  @keyframes floatIn   { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }
  .motion-soft-rise { animation: softRise .52s cubic-bezier(.22,1,.3,1) both; }
  .motion-soft-pop { animation: softPop .44s cubic-bezier(.22,1,.3,1) both; }
  .motion-float-in { animation: floatIn .42s cubic-bezier(.22,1,.3,1) both; }
</style>
</head>
