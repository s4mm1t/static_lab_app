services:
  db:
    image: postgres:16-alpine
    container_name: trackfoodai-db
    environment:
      POSTGRES_DB: trackfoodai
      POSTGRES_USER: trackfoodai
      POSTGRES_PASSWORD: trackfoodai
    ports:
      - "5432:5432"
    volumes:
      - trackfoodai-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackfoodai -d trackfoodai"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  planner_db:
    image: postgres:16-alpine
    container_name: trackfoodai-planner-db
    environment:
      POSTGRES_DB: trackfoodai_planner
      POSTGRES_USER: trackfoodai
      POSTGRES_PASSWORD: trackfoodai
    ports:
      - "5433:5432"
    volumes:
      - trackfoodai-planner-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackfoodai -d trackfoodai_planner"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  assistant_db:
    image: postgres:16-alpine
    container_name: trackfoodai-assistant-db
    environment:
      POSTGRES_DB: trackfoodai_assistant
      POSTGRES_USER: trackfoodai
      POSTGRES_PASSWORD: trackfoodai
    ports:
      - "5434:5432"
    volumes:
      - trackfoodai-assistant-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackfoodai -d trackfoodai_assistant"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: static-lab-backend
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://trackfoodai:trackfoodai@db:5432/trackfoodai
      PLANNER_DATABASE_URL: postgresql://trackfoodai:trackfoodai@planner_db:5432/trackfoodai_planner
      ASSISTANT_DATABASE_URL: postgresql://trackfoodai:trackfoodai@assistant_db:5432/trackfoodai_assistant
      EXTERNAL_PRODUCTS_SQLITE: /external-db/Combined.sqlite
      SECRET_KEY: trackfoodai-local-docker-secret-change-me
      STATIC_LAB_ADMIN_EMAILS: "${STATIC_LAB_ADMIN_EMAILS:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash-lite}"
      ALLOWED_HOSTS: "localhost,127.0.0.1,testserver,backend,frontend,*.orb.local,192.168.18.40,192.168.18.87,192.168.18.123"
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://192.168.18.40:3000,http://192.168.18.87:3000,http://192.168.18.123:3000"
      CORS_ORIGIN_REGEX: "https?://(localhost|127\\.0\\.0\\.1|192\\.168\\.\\d{1,3}\\.\\d{1,3}):3000"
    volumes:
      - "${STATIC_LAB_PRODUCT_DB_DIR:-/Volumes/NEYKA SSD/db for static_lab/newbd/Combine (full)}:/external-db:ro"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      planner_db:
        condition: service_healthy
      assistant_db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: trackfoodai-frontend
    environment:
      NEXT_PUBLIC_API_URL: ""
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  trackfoodai-postgres:
  trackfoodai-planner-postgres:
  trackfoodai-assistant-postgres:
